services:
  postgres:
    image: postgres:16-alpine
    container_name: school_erp_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-school_erp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-school_erp_password}
      POSTGRES_DB: ${POSTGRES_DB:-school_erp_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-school_erp_user} -d ${POSTGRES_DB:-school_erp_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
